<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HW4 - 景點觀光展覽資訊 (含搜尋與分頁)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body class="p-4">
    <div class="d-flex align-items-center mb-3">
        <h2 class="mb-0 me-4">景點觀光展覽資訊</h2>
        <input type="text" id="searchInput" class="form-control w-25" placeholder="搜尋名稱..." onchange="searchData()">
    </div>
    
    <table class="table table-striped table-hover border">
        <thead class="table-success">
            <tr>
                <th width="50%">名稱</th>
                <th width="30%">地點</th>
                <th width="20%">票價</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="3">資料載入中...</td></tr>
        </tbody>
    </table>

    <div class="d-flex align-items-center mt-3">
        <button id="prevBtn" class="btn btn-outline-secondary btn-sm me-3" onclick="prevPage()">上一頁</button>
        <span id="pageInfo" class="fw-bold">1 / 1 頁</span>
        <button id="nextBtn" class="btn btn-outline-secondary btn-sm ms-3" onclick="nextPage()">下一頁</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
